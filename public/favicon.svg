<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1520"/>
      <stop offset="100%" stop-color="#070c14"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="url(#bgGrad)"/>

  <!-- Border accent top -->
  <rect x="0" y="0" width="64" height="2" rx="1" fill="#3b82f6" opacity="0.6"/>
  <!-- Border accent bottom -->
  <rect x="0" y="62" width="64" height="2" rx="1" fill="#dc2626" opacity="0.6"/>

  <!-- D - синий -->
  <text x="4" y="46"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="32"
    fill="#3b82f6"
    filter="url(#glow)"
    opacity="0.95">D</text>

  <!-- S - красный (средний) -->
  <text x="22" y="46"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="32"
    fill="#dc2626"
    filter="url(#glow)"
    opacity="0.95">S</text>

  <!-- S - синий -->
  <text x="40" y="46"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="32"
    fill="#3b82f6"
    filter="url(#glow)"
    opacity="0.95">S</text>

  <!-- Corner dots -->
  <circle cx="4" cy="4" r="1.5" fill="#3b82f6" opacity="0.5"/>
  <circle cx="60" cy="4" r="1.5" fill="#3b82f6" opacity="0.5"/>
  <circle cx="4" cy="60" r="1.5" fill="#dc2626" opacity="0.5"/>
  <circle cx="60" cy="60" r="1.5" fill="#dc2626" opacity="0.5"/>
</svg>
